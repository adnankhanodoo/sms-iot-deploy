auth:
  enabled: false

mqtt:
  enabled: true
  host: 192.168.51.199
  port: 1883
  topic_prefix: frigate-165
  client_id: frigate-165
  stats_interval: 60

go2rtc:
  streams:
    cam242:
    - rtsp://sms:admin123@192.168.51.242:554/cam/realmonitor?channel=1&subtype=0#backchannel=0
    cam243:
    - rtsp://admin:Drd-7861@192.168.51.243:554/cam/realmonitor?channel=1&subtype=0
    - ffmpeg:cam243#audio=opus#async
    cam243_sub:
    - rtsp://admin:Drd-7861@192.168.51.243:554/cam/realmonitor?channel=1&subtype=1
  webrtc:
    listen: :8555
    candidates:
    - media.smsiotpk.com:8555
    - 192.168.51.199:8555
    ice_servers:
    - urls:
      - stun:stun.l.google.com:19302

objects:
  track:
  - person
  - car
  - dog
  - cat
  - bird
  filters:
    person:
      min_score: 0.6
      threshold: 0.7
    car:
      min_score: 0.6
      threshold: 0.7

record:
  enabled: true
  alerts:
    retain:
      days: 0.083
      mode: motion
  detections:
    retain:
      days: 0.083
      mode: motion

snapshots:
  enabled: true
  bounding_box: true
  retain:
    default: 7

cameras:
  cam242:
    enabled: true
    ffmpeg:
      hwaccel_args: preset-rpi-64-h264
      inputs:
      - input_args: preset-rtsp-restream
        path: rtsp://127.0.0.1:8554/cam242
        roles:
        - detect
        - record
      output_args:
        record: preset-record-generic
    detect:
      enabled: true
      width: 704
      height: 576
      fps: 3
    record:
      enabled: true
    snapshots:
      enabled: true
    motion:
      threshold: 30
      contour_area: 15

  cam243:
    enabled: true
    ffmpeg:
      hwaccel_args: preset-rpi-64-h264
      inputs:
      - input_args: preset-rtsp-restream
        path: rtsp://127.0.0.1:8554/cam243_sub
        roles:
        - detect
      - input_args: preset-rtsp-restream
        path: rtsp://127.0.0.1:8554/cam243
        roles:
        - record
      output_args:
        record: preset-record-generic-audio-copy
    detect:
      enabled: true
      width: 1280
      height: 720
      fps: 3
    record:
      enabled: true
    snapshots:
      enabled: true
      bounding_box: true
    motion:
      threshold: 30
      contour_area: 15
    zones:
      full_frame:
        coordinates: 0,0,0,1,1,1,1,0
    onvif:
      host: 192.168.51.243
      port: 80
      user: admin
      password: Drd-7861
      autotracking:
        enabled: true
        calibrate_on_startup: false
        zooming: disabled
        track:
        - person
        - car
        required_zones:
        - full_frame
        return_preset: home
        timeout: 10

semantic_search:
  enabled: false
face_recognition:
  enabled: false
lpr:
  enabled: false
classification:
  bird:
    enabled: true
version: 0.17-0
